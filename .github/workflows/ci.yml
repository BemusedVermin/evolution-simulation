name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Newer pushes to a PR cancel older in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

jobs:
  # Fast feedback lane: fmt + clippy + unit/integration tests + doctests on
  # the primary development OS. This job gates merges.
  lint-and-test:
    name: lint-and-test (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (all targets, -D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (unit + integration)
        run: cargo test --workspace --all-targets --locked

      - name: cargo test --doc
        run: cargo test --workspace --doc --locked

  # Cross-platform determinism sanity: the Box-Muller Gaussian and the PRNG
  # both claim bit-identical output across x86_64 targets. Running tests on
  # Windows and macOS catches regressions in that claim before they reach
  # main — cheaper to detect here than when a replay hash diverges in S6.
  cross-platform-test:
    name: test (${{ matrix.os }})
    needs: [lint-and-test, quality-metrics, coverage]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  # Dependency audit: advisories, licenses, unknown registries / git sources.
  # Configuration lives in `deny.toml` at the repo root. Failing here means a
  # new dep has a known CVE, uses an unvetted license, or was pulled from a
  # source we haven't approved.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo deny check
        run: cargo deny check --hide-inclusion-graph

  # Coverage reporting. Report-only today — testing.md targets 80% line
  # coverage; once we have baseline numbers from a few CI runs we can flip
  # the `--fail-under-lines` flag on to enforce the threshold. Runs with
  # `--no-fail-fast` so a single flaky test doesn't mask the coverage report.
  coverage:
    name: coverage (ubuntu)
    needs: [lint-and-test, quality-metrics]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov (summary)
        run: cargo llvm-cov --workspace --all-targets --locked --summary-only --no-fail-fast

      - name: cargo llvm-cov (JSON summary artifact)
        run: cargo llvm-cov report --json --summary-only --output-path coverage-summary.json

      - name: cargo llvm-cov (LCOV for upload)
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage-summary.json
            lcov.info
          retention-days: 14

  # Metric-driven maintainability checks complement the debt audit better than
  # subjective review alone: we track complexity, function length, and
  # duplicate rate together instead of relying on a single smell proxy.
  quality-metrics:
    name: quality-metrics (ubuntu)
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QUALITY_MAX_CCN: 10
      QUALITY_MAX_LENGTH: 80
      QUALITY_MAX_DUPLICATE_RATE: 5.0
      QUALITY_MIN_PUBLIC_DOC_COVERAGE: 80.0
    steps:
      - uses: actions/checkout@v6

      - name: Install lizard
        run: python -m pip install --disable-pip-version-check lizard

      - name: Measure maintainability metrics
        # Shared with .githooks/pre-push — both call the same driver script
        # so the lizard invocations, flags, and threshold gates stay in one
        # place. `--artifact-dir` keeps the report files at the repo root
        # where the upload step below expects them. Thresholds come from the
        # job `env:` block above; the script falls back to the same defaults
        # so pre-push doesn't have to re-declare them.
        run: |
          set +e
          .github/scripts/run-quality-metrics.sh --artifact-dir "${{ github.workspace }}" >/dev/null
          status=$?
          set -e
          if [ -f quality-summary.md ]; then
            cat quality-summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi
          exit "$status"

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quality-metrics
          path: |
            quality-functions.csv
            quality-lizard.txt
            quality-duplicates.txt
            quality-summary.md
          retention-days: 14

  # Release build ensures nothing regressed under opt-level=3 + LTO.
  release-build:
    name: release-build (ubuntu)
    needs: [lint-and-test, quality-metrics, coverage, cross-platform-test]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-release

      - name: cargo build --release
        run: cargo build --workspace --release --locked
