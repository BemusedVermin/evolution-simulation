[workspace]
resolver = "2"
members = [
    "crates/beast-core",
    "crates/beast-channels",
    "crates/beast-primitives",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "Proprietary"
authors = ["Beast Evolution Game contributors"]
repository = "https://example.invalid/beast-evolution-game"
publish = false

[workspace.dependencies]
fixed = { version = "1.28", features = ["serde"] }
rand_core = "0.9"
rand_xoshiro = { version = "0.7", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

# Sprint 2: manifest + registry deps. `jsonschema` is pinned to a minor that
# works on stable Rust 1.75. `regex` backs the provenance string validator.
jsonschema = { version = "0.17", default-features = false }
regex = "1"

beast-core = { path = "crates/beast-core" }
beast-channels = { path = "crates/beast-channels" }
beast-primitives = { path = "crates/beast-primitives" }

# Dev-only
proptest = "1.5"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
debug = false

[profile.bench]
lto = "thin"
codegen-units = 1
opt-level = 3
debug = true
