<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <title>Player Inventory &#38; MaterialStack Catalog</title>
  <desc>Inventory screen showing material stacks in grid layout with detail pane, properties breakdown, and filtering controls.</desc>

  <style>
    .panel { fill: #f5f5f5; stroke: #333; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .label-small { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
    .accent { fill: #ff6b35; }
    .button { fill: #e0e0e0; stroke: #333; stroke-width: 1; }
    .stack-cell { fill: #f0f0f0; stroke: #999; stroke-width: 1; }
    .stack-cell-selected { fill: #fff9e6; stroke: #ff6b35; stroke-width: 2; }
    .property-bar { fill: #e0e0e0; stroke: #333; stroke-width: 0.5; }
  </style>

  <!-- TOP BAR: Title & Controls -->
  <rect class="panel" x="0" y="0" width="1920" height="60"/>
  <text class="label" x="20" y="35" font-weight="bold">Inventory &#38; Materials</text>

  <!-- TABS: Below title bar -->
  <!-- Comment: Filter by material type; "All" shows complete inventory, others narrow by category for faster navigation. -->
  <rect class="button" x="20" y="70" width="70" height="25" fill="#ff6b35"/>
  <text class="label-small" x="30" y="87">[A] All</text>

  <rect class="button" x="100" y="70" width="70" height="25"/>
  <text class="label-small" x="110" y="87">[R] Raw</text>

  <rect class="button" x="180" y="70" width="90" height="25"/>
  <text class="label-small" x="190" y="87">[F] Refined</text>

  <rect class="button" x="280" y="70" width="110" height="25"/>
  <text class="label-small" x="290" y="87">[B] Butchered</text>

  <rect class="button" x="400" y="70" width="80" height="25"/>
  <text class="label-small" x="410" y="87">[C] Crafted</text>

  <rect class="button" x="490" y="70" width="100" height="25"/>
  <text class="label-small" x="500" y="87">[$ ] Currency</text>

  <!-- CAPACITY BAR -->
  <text class="label-small" x="700" y="87">Capacity: 145/200 units</text>
  <rect x="850" y="75" width="150" height="15" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="850" y="75" width="109" height="15" fill="#4a90e2"/>

  <!-- SORT & FILTER CONTROLS: Top-right -->
  <text class="label-small" x="1600" y="87">Sort by:</text>
  <rect class="button" x="1700" y="70" width="70" height="25"/>
  <text class="label-small" x="1710" y="87">Name</text>

  <rect class="button" x="1780" y="70" width="130" height="25"/>
  <text class="label-small" x="1790" y="87">Quantity ▼</text>

  <!-- MATERIAL STACKS GRID: Left side -->
  <!-- Comment: Grid of material stacks; each cell shows condensed info. Click to select and show detail pane. Properties shown as small sparkline bars (17 properties). -->
  <text class="label" x="20" y="120" font-weight="bold">Materials (47 stacks)</text>

  <!-- Row 1 -->
  <!-- Stack 1: Obsidian flake — refined (selected) -->
  <rect class="stack-cell-selected" x="20" y="135" width="160" height="100"/>
  <text class="label-small" x="30" y="155" font-weight="bold">Obsidian flake</text>
  <text class="label-small" x="30" y="170">Refined</text>
  <text class="label-small" x="30" y="185">Qty: 23</text>
  <!-- Sparkline (17 properties compressed) -->
  <line x1="30" y1="200" x2="40" y2="195" stroke="#4a90e2" stroke-width="1"/>
  <line x1="40" y1="195" x2="50" y2="198" stroke="#4a90e2" stroke-width="1"/>
  <line x1="50" y1="198" x2="60" y2="192" stroke="#4a90e2" stroke-width="1"/>
  <line x1="60" y1="192" x2="70" y2="205" stroke="#4a90e2" stroke-width="1"/>
  <line x1="70" y1="205" x2="80" y2="200" stroke="#4a90e2" stroke-width="1"/>
  <line x1="80" y1="200" x2="90" y2="194" stroke="#4a90e2" stroke-width="1"/>
  <line x1="90" y1="194" x2="100" y2="207" stroke="#4a90e2" stroke-width="1"/>
  <line x1="100" y1="207" x2="110" y2="201" stroke="#4a90e2" stroke-width="1"/>
  <line x1="110" y1="201" x2="120" y2="198" stroke="#4a90e2" stroke-width="1"/>
  <line x1="120" y1="198" x2="130" y2="203" stroke="#4a90e2" stroke-width="1"/>
  <line x1="130" y1="203" x2="140" y2="197" stroke="#4a90e2" stroke-width="1"/>
  <line x1="140" y1="197" x2="150" y2="204" stroke="#4a90e2" stroke-width="1"/>
  <line x1="150" y1="204" x2="160" y2="200" stroke="#4a90e2" stroke-width="1"/>

  <!-- Stack 2: Bone — butchered -->
  <rect class="stack-cell" x="200" y="135" width="160" height="100"/>
  <text class="label-small" x="210" y="155" font-weight="bold">Bone fragment</text>
  <text class="label-small" x="210" y="170">Butchered anatomy</text>
  <text class="label-small" x="210" y="185">Qty: 67</text>
  <!-- Sparkline -->
  <line x1="210" y1="200" x2="220" y2="202" stroke="#666" stroke-width="1"/>
  <line x1="220" y1="202" x2="230" y2="198" stroke="#666" stroke-width="1"/>
  <line x1="230" y1="198" x2="240" y2="205" stroke="#666" stroke-width="1"/>
  <line x1="240" y1="205" x2="250" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="250" y1="200" x2="260" y2="197" stroke="#666" stroke-width="1"/>
  <line x1="260" y1="197" x2="270" y2="206" stroke="#666" stroke-width="1"/>
  <line x1="270" y1="206" x2="280" y2="199" stroke="#666" stroke-width="1"/>
  <line x1="280" y1="199" x2="290" y2="203" stroke="#666" stroke-width="1"/>
  <line x1="290" y1="203" x2="300" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="300" y1="200" x2="310" y2="204" stroke="#666" stroke-width="1"/>
  <line x1="310" y1="204" x2="320" y2="198" stroke="#666" stroke-width="1"/>
  <line x1="320" y1="198" x2="330" y2="205" stroke="#666" stroke-width="1"/>
  <line x1="330" y1="205" x2="340" y2="201" stroke="#666" stroke-width="1"/>

  <!-- Stack 3: Copper ore — raw -->
  <rect class="stack-cell" x="380" y="135" width="160" height="100"/>
  <text class="label-small" x="390" y="155" font-weight="bold">Copper ore</text>
  <text class="label-small" x="390" y="170">Raw</text>
  <text class="label-small" x="390" y="185">Qty: 12</text>

  <!-- Stack 4: Leather hide — crafted -->
  <rect class="stack-cell" x="560" y="135" width="160" height="100"/>
  <text class="label-small" x="570" y="155" font-weight="bold">Leather hide</text>
  <text class="label-small" x="570" y="170">Crafted</text>
  <text class="label-small" x="570" y="185">Qty: 3</text>

  <!-- Row 2 -->
  <!-- Stack 5: Fungal spore -->
  <rect class="stack-cell" x="20" y="255" width="160" height="100"/>
  <text class="label-small" x="30" y="275" font-weight="bold">Fungal spore</text>
  <text class="label-small" x="30" y="290">Refined</text>
  <text class="label-small" x="30" y="305">Qty: 8</text>

  <!-- Stack 6: Iron ingot -->
  <rect class="stack-cell" x="200" y="255" width="160" height="100"/>
  <text class="label-small" x="210" y="275" font-weight="bold">Iron ingot</text>
  <text class="label-small" x="210" y="290">Refined</text>
  <text class="label-small" x="210" y="305">Qty: 14</text>

  <!-- Stack 7: Plant fiber -->
  <rect class="stack-cell" x="380" y="255" width="160" height="100"/>
  <text class="label-small" x="390" y="275" font-weight="bold">Plant fiber</text>
  <text class="label-small" x="390" y="290">Raw</text>
  <text class="label-small" x="390" y="305">Qty: 42</text>

  <!-- Stack 8: Token (currency) -->
  <rect class="stack-cell" x="560" y="255" width="160" height="100"/>
  <text class="label-small" x="570" y="275" font-weight="bold">Trade token</text>
  <text class="label-small" x="570" y="290">Currency</text>
  <text class="label-small" x="570" y="305">Qty: 150</text>

  <!-- DETAIL PANE: Right side -->
  <!-- Comment: When stack is selected, shows full 17-property breakdown, provenance, crafting uses, and market value. -->
  <rect class="panel" x="800" y="110" width="1100" height="840"/>

  <text class="label" x="820" y="135" font-weight="bold">Obsidian flake — Refined</text>

  <!-- Basic info -->
  <text class="label-small" x="820" y="160">Quantity in stack: 23 units</text>
  <text class="label-small" x="820" y="175">Weight: 4.6 kg total (0.2 kg/unit)</text>

  <!-- Provenance -->
  <text class="label" x="820" y="205" font-weight="bold">Provenance</text>
  <text class="label-small" x="820" y="225">Source: Blackpeak obsidian deposit</text>
  <text class="label-small" x="820" y="240">Date obtained: Day 138, Year 18</text>
  <text class="label-small" x="820" y="255">Method: Mined / Refined by Ashcairn smithy</text>
  <text class="label-small" x="820" y="270">Quality grade: A (fine-grained)</text>

  <!-- 17-Property Breakdown -->
  <text class="label" x="820" y="300" font-weight="bold">Material Properties (17)</text>

  <!-- Property bars (simplified display) -->
  <text class="label-small" x="820" y="320">Hardness: 7.5/10</text>
  <rect class="property-bar" x="1000" y="315" width="100" height="8"/>
  <rect x="1000" y="315" width="75" height="8" fill="#4a90e2"/>

  <text class="label-small" x="820" y="340">Sharpness: 9/10</text>
  <rect class="property-bar" x="1000" y="335" width="100" height="8"/>
  <rect x="1000" y="335" width="90" height="8" fill="#4a90e2"/>

  <text class="label-small" x="820" y="360">Density: 2.65 g/cm³</text>
  <rect class="property-bar" x="1000" y="355" width="100" height="8"/>
  <rect x="1000" y="355" width="65" height="8" fill="#4a90e2"/>

  <text class="label-small" x="820" y="380">Heat resistance: 4/10</text>
  <rect class="property-bar" x="1000" y="375" width="100" height="8"/>
  <rect x="1000" y="375" width="40" height="8" fill="#ff6b35"/>

  <text class="label-small" x="820" y="400">Conductivity: 2/10</text>
  <rect class="property-bar" x="1000" y="395" width="100" height="8"/>
  <rect x="1000" y="395" width="20" height="8" fill="#ff6b35"/>

  <text class="label-small" x="820" y="420">Flexibility: 1/10</text>
  <text class="label-small" x="820" y="440">Corrosion resistance: 9/10</text>
  <text class="label-small" x="820" y="460">Rarity: Uncommon (regional deposits)</text>

  <!-- Remaining properties abbreviated -->
  <text class="label-small" x="820" y="485">+ 10 more properties...</text>

  <!-- Crafting Uses -->
  <text class="label" x="820" y="520" font-weight="bold">Crafting Uses</text>
  <text class="label-small" x="820" y="540">Suggested recipes:</text>
  <text class="label-small" x="830" y="555">- Obsidian blade (req: 5x flake, 3x leather) → Rarity: Rare</text>
  <text class="label-small" x="830" y="570">- Sharp tool (req: 2x flake) → Rarity: Common</text>
  <text class="label-small" x="830" y="585">- Ornament (req: 1x flake) → Luxury trade goods</text>

  <!-- Market Value -->
  <text class="label" x="820" y="620" font-weight="bold">Market Value</text>
  <text class="label-small" x="820" y="640">Base price: 15 tokens/unit</text>
  <text class="label-small" x="820" y="655">Ashcairn buy price: 18 tokens/unit</text>
  <text class="label-small" x="820" y="670">Stonewater buy price: 14 tokens/unit</text>
  <text class="label-small" x="820" y="685">Current stack value: 345 tokens (23 units × 15)</text>

  <!-- ACTION BUTTONS -->
  <rect class="button" x="820" y="730" width="100" height="30"/>
  <text class="label-small" x="835" y="751">Use/Consume</text>

  <rect class="button" x="930" y="730" width="100" height="30"/>
  <text class="label-small" x="940" y="751">Drop</text>

  <rect class="button" x="1040" y="730" width="100" height="30"/>
  <text class="label-small" x="1050" y="751">Trade</text>

  <rect class="button" x="1150" y="730" width="100" height="30"/>
  <text class="label-small" x="1160" y="751">Craft</text>

</svg>
