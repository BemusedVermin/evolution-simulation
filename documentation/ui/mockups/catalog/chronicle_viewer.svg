<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      body { font-family: system-ui, sans-serif; }
      .panel { fill: #f5f5f5; stroke: #ccc; stroke-width: 2; }
      .header { fill: #2c3e50; color: white; }
      .label { fill: #333; font-size: 14px; font-weight: 500; }
      .subtext { fill: #666; font-size: 12px; }
      .accent { fill: #ff6b35; }
      .accent-light { fill: #ff6b35; opacity: 0.15; }
      .divider { stroke: #ddd; stroke-width: 1; }
      .chip { fill: #e8e8e8; stroke: #999; stroke-width: 1; }
      .chip-selected { fill: #0099cc; }
      .timeline-era-1 { fill: #ff6b35; }
      .timeline-era-2 { fill: #0099cc; }
      .timeline-era-3 { fill: #00bb44; }
      .timeline-era-4 { fill: #9966cc; }
      .event-entry { fill: #fafafa; }
      .timestamp { fill: #666; font-size: 11px; }
      .headline { fill: #333; font-size: 12px; font-weight: 500; }
      .detail-pill { fill: #ddd; stroke: #999; stroke-width: 1; }
    </style>
  </defs>

  <title>Chronicle Viewer — Event Log &#38; Era Timeline</title>
  <desc>Temporal narrative with Chronicler-detected eras, event feed indexed by faction/region, and underlying sim data. Sources: Chronicler event detection, primitive signature clustering, trade-volume thresholds, extinction events.</desc>

  <!-- TOP: Era timeline (horizontal) -->
  <rect x="10" y="10" width="1900" height="80" class="panel" rx="3" />
  <text x="30" y="35" class="label" font-weight="700">Era Timeline (Chronicler-detected)</text>

  <!-- Era blocks -->
  <rect x="30" y="50" width="120" height="30" class="timeline-era-1" rx="3" />
  <text x="50" y="70" fill="white" class="subtext" font-weight="600">Early Hunt</text>
  <text x="50" y="82" fill="white" class="subtext" font-size="10">Tick 0–1200</text>

  <rect x="160" y="50" width="140" height="30" class="timeline-era-2" rx="3" />
  <text x="180" y="70" fill="white" class="subtext" font-weight="600">Sapience Rise</text>
  <text x="180" y="82" fill="white" class="subtext" font-size="10">Tick 1200–3100</text>

  <rect x="310" y="50" width="120" height="30" class="timeline-era-3" rx="3" />
  <text x="330" y="70" fill="white" class="subtext" font-weight="600">Trade Wars</text>
  <text x="330" y="82" fill="white" class="subtext" font-size="10">Tick 3100–4500</text>

  <rect x="440" y="50" width="140" height="30" class="timeline-era-4" rx="3" />
  <text x="460" y="70" fill="white" class="subtext" font-weight="600">Great Famine</text>
  <text x="460" y="82" fill="white" class="subtext" font-size="10">Tick 4500–5200</text>

  <!-- Current tick indicator -->
  <line x1="600" y1="48" x2="600" y2="85" stroke="#333" stroke-width="3" />
  <text x="610" y="72" class="subtext" font-weight="600">Now: Tick 5045</text>

  <!-- LEFT PANEL: Event filters -->
  <rect x="10" y="100" width="280" height="980" class="panel" rx="3" />
  <text x="25" y="130" class="label" font-weight="700">Event Filters</text>

  <!-- Filter chips: Event types -->
  <text x="25" y="160" class="label" font-weight="600" font-size="12">Event Types:</text>

  <rect x="25" y="175" width="70" height="25" class="chip-selected" rx="3" />
  <text x="35" y="193" fill="white" class="subtext" font-weight="600" font-size="11">Wars</text>

  <rect x="105" y="175" width="85" height="25" class="chip" rx="3" />
  <text x="115" y="193" class="subtext" font-size="11">Migrations</text>

  <rect x="200" y="175" width="75" height="25" class="chip" rx="3" />
  <text x="210" y="193" class="subtext" font-size="11">Inventions</text>

  <rect x="25" y="210" width="85" height="25" class="chip" rx="3" />
  <text x="35" y="228" class="subtext" font-size="11">Extinctions</text>

  <rect x="120" y="210" width="75" height="25" class="chip" rx="3" />
  <text x="130" y="228" class="subtext" font-size="11">Epidemics</text>

  <rect x="205" y="210" width="50" height="25" class="chip" rx="3" />
  <text x="215" y="228" class="subtext" font-size="11">Climate</text>

  <rect x="25" y="245" width="100" height="25" class="chip" rx="3" />
  <text x="35" y="263" class="subtext" font-size="11">Labels Coined</text>

  <rect x="135" y="245" width="100" height="25" class="chip" rx="3" />
  <text x="145" y="263" class="subtext" font-size="11">Trade Routes</text>

  <rect x="245" y="245" width="80" height="25" class="chip" rx="3" />
  <text x="255" y="263" class="subtext" font-size="11">Dynasties</text>

  <!-- Faction filter -->
  <text x="25" y="290" class="label" font-weight="600" font-size="12">Faction:</text>
  <rect x="25" y="305" width="240" height="25" class="chip" rx="3" />
  <text x="35" y="323" class="subtext" font-size="11">All factions</text>

  <!-- Region filter -->
  <text x="25" y="350" class="label" font-weight="600" font-size="12">Region:</text>
  <rect x="25" y="365" width="240" height="25" class="chip" rx="3" />
  <text x="35" y="383" class="subtext" font-size="11">All regions</text>

  <!-- Clear filters button -->
  <rect x="25" y="900" width="240" height="35" fill="none" stroke="#999" stroke-width="1" rx="3" />
  <text x="125" y="923" class="label" text-anchor="middle">Clear Filters</text>

  <!-- CENTER PANEL: Event feed (vertical) -->
  <rect x="300" y="100" width="900" height="980" class="panel" rx="3" />
  <text x="320" y="130" class="label" font-weight="700">Event Chronicle Feed</text>

  <!-- Event entries (scrollable region) -->
  <!-- Event 1 -->
  <rect x="320" y="150" width="860" height="75" class="event-entry" rx="2" />
  <text x="330" y="170" class="timestamp">Tick 5012 | Cavern-Deep / Northern Trade Alliance</text>
  <text x="330" y="190" class="headline">War broke out: Traders vs. Apex Predators over resource control</text>

  <!-- Actor chips -->
  <rect x="330" y="200" width="80" height="20" class="chip" rx="2" />
  <text x="340" y="213" class="subtext" font-size="10">Traders α</text>

  <rect x="420" y="200" width="85" height="20" class="chip" rx="2" />
  <text x="430" y="213" class="subtext" font-size="10">Apex Hunt β</text>

  <!-- Detail pills -->
  <rect x="520" y="200" width="100" height="20" class="detail-pill" rx="2" />
  <text x="530" y="213" class="subtext" font-size="10">show primitives</text>

  <rect x="630" y="200" width="95" height="20" class="detail-pill" rx="2" />
  <text x="640" y="213" class="subtext" font-size="10">show signature</text>

  <!-- Event 2 -->
  <rect x="320" y="235" width="860" height="75" class="event-entry" rx="2" />
  <text x="330" y="255" class="timestamp">Tick 4998 | Underground Lake / Hominid Settlement</text>
  <text x="330" y="275" class="headline">Epidemic: "Silent Death" claimed 40% of Pair-Bond γ population</text>

  <rect x="330" y="285" width="95" height="20" class="chip" rx="2" />
  <text x="340" y="298" class="subtext" font-size="10">Pair-Bond γ</text>

  <rect x="435" y="285" width="110" height="20" class="chip" rx="2" />
  <text x="445" y="298" class="subtext" font-size="10">Hominid Tribe Δ</text>

  <rect x="555" y="285" width="100" height="20" class="detail-pill" rx="2" />
  <text x="565" y="298" class="subtext" font-size="10">show primitives</text>

  <!-- Event 3 -->
  <rect x="320" y="320" width="860" height="75" class="event-entry" rx="2" />
  <text x="330" y="340" class="timestamp">Tick 4820 | Regional Trade Hubs</text>
  <text x="330" y="360" class="headline">Trade route established: Cavern-Deep ↔ Underground Lake (new label: "Silk Road of the Depths")</text>

  <rect x="330" y="370" width="85" height="20" class="chip" rx="2" />
  <text x="340" y="383" class="subtext" font-size="10">Traders α</text>

  <rect x="425" y="370" width="95" height="20" class="chip" rx="2" />
  <text x="435" y="383" class="subtext" font-size="10">Hominid Tribe</text>

  <rect x="530" y="370" width="100" height="20" class="detail-pill" rx="2" />
  <text x="540" y="383" class="subtext" font-size="10">show signature</text>

  <!-- Event 4 -->
  <rect x="320" y="405" width="860" height="75" class="event-entry" rx="2" />
  <text x="330" y="425" class="timestamp">Tick 4100 | Crystalline Cavern</text>
  <text x="330" y="445" class="headline">Invention discovered: "crystal-singing" (label from modulate_pitch + resonance_response cluster)</text>

  <rect x="330" y="455" width="100" height="20" class="chip" rx="2" />
  <text x="340" y="468" class="subtext" font-size="10">Echoloc. Hunt</text>

  <rect x="440" y="455" width="80" height="20" class="detail-pill" rx="2" />
  <text x="450" y="468" class="subtext" font-size="10">show signature</text>

  <!-- Event 5 -->
  <rect x="320" y="490" width="860" height="75" class="event-entry" rx="2" />
  <text x="330" y="510" class="timestamp">Tick 3200 | Deep underground populations</text>
  <text x="330" y="530" class="headline">Sapience threshold crossed: Hominid Tribe Δ reaches consensus-decision-making</text>

  <rect x="330" y="540" width="95" height="20" class="chip" rx="2" />
  <text x="340" y="553" class="subtext" font-size="10">Hominid Tribe</text>

  <rect x="435" y="540" width="100" height="20" class="detail-pill" rx="2" />
  <text x="445" y="553" class="subtext" font-size="10">show primitives</text>

  <!-- Scrollbar hint -->
  <text x="320" y="970" class="subtext" font-style="italic">... scroll for earlier events</text>

  <!-- RIGHT PANEL: Detail pane -->
  <rect x="1210" y="100" width="700" height="980" class="panel" rx="3" />
  <text x="1230" y="130" class="label" font-weight="700">Event Detail (Tick 5012)</text>
  <line x1="1230" y1="135" x2="1890" y2="135" class="divider" />

  <!-- Selected event detail -->
  <text x="1230" y="165" class="label" font-weight="600">War: Traders vs. Apex Predators</text>
  <text x="1230" y="185" class="subtext">Region: Cavern-Deep</text>
  <text x="1230" y="200" class="subtext">Tick: 5012</text>

  <text x="1230" y="230" class="label" font-weight="600">Entities Involved</text>
  <line x1="1230" y1="235" x2="1890" y2="235" class="divider" />

  <text x="1230" y="260" class="subtext">Traders: 24 individuals, 3 settlements</text>
  <text x="1230" y="280" class="subtext">Apex Predators: 8 individuals, 1 main hunting ground</text>
  <text x="1230" y="300" class="subtext">Casualties: 3 Traders, 2 Predators</text>

  <text x="1230" y="335" class="label" font-weight="600">Primitive Signature</text>
  <line x1="1230" y1="340" x2="1890" y2="340" class="divider" />

  <text x="1230" y="365" class="subtext">emit_aggressive_signal [0.8–1.2 MHz]</text>
  <text x="1230" y="385" class="subtext">kinetic_strike [force 200–450 N]</text>
  <text x="1230" y="405" class="subtext">territory_claim [duration 120+ ticks]</text>
  <text x="1230" y="425" class="subtext">Triggered label: "territorial conflict" (recurring cluster)</text>

  <text x="1230" y="460" class="label" font-weight="600">Underlying Cause</text>
  <line x1="1230" y1="465" x2="1890" y2="465" class="divider" />

  <text x="1230" y="490" class="subtext">Resource threshold hit: Chitin scarcity rose to 78%</text>
  <text x="1230" y="510" class="subtext">Trade-volume anomaly: Route saturation detected</text>
  <text x="1230" y="530" class="subtext">Faction opinion drift: Apex predators − Traders reputation fell to −45</text>

  <!-- Save as lore page button -->
  <rect x="1230" y="900" width="650" height="40" class="accent-light" rx="3" border-width="2" />
  <text x="1555" y="930" class="label" text-anchor="middle" font-weight="600">📖 Save as Lore Page in Journal</text>

</svg>
