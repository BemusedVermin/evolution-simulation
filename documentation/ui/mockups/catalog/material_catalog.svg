<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      body { font-family: system-ui, sans-serif; }
      .panel { fill: #f5f5f5; stroke: #ccc; stroke-width: 2; }
      .header { fill: #2c3e50; color: white; }
      .label { fill: #333; font-size: 14px; font-weight: 500; }
      .subtext { fill: #666; font-size: 12px; }
      .accent { fill: #00bb44; }
      .accent-text { fill: #00bb44; font-weight: 600; }
      .tabs { fill: #ddd; stroke: #999; stroke-width: 1; }
      .tabs-active { fill: #0099cc; }
      .row-alt { fill: #fafafa; }
      .chart-bar { fill: #00bb44; opacity: 0.7; }
      .divider { stroke: #ddd; stroke-width: 1; }
      .property-name { fill: #333; font-size: 11px; }
    </style>
  </defs>

  <title>Material Catalog — MaterialStack Property Reference</title>
  <desc>17-property material reference with provenance, uses, and market data. Sources: material drop tables, crafting recipes, market simulation, inject_substance primitives.</desc>

  <!-- Top scarcity indicator -->
  <rect x="10" y="10" width="1900" height="50" class="panel" rx="3" />
  <text x="30" y="40" class="label" font-weight="700">Global Material Scarcity Index:</text>
  <rect x="350" y="20" width="600" height="30" class="chart-bar" opacity="0.5" rx="3" />
  <text x="960" y="40" class="subtext">42 materials tracked | Abundance up 12% last 500 ticks</text>

  <!-- Material type tabs -->
  <rect x="30" y="70" width="100" height="35" class="tabs-active" rx="3" />
  <text x="50" y="95" fill="white" class="label" font-size="12">All</text>

  <rect x="140" y="70" width="100" height="35" class="tabs" rx="3" />
  <text x="160" y="95" class="label" font-size="12">Raw</text>

  <rect x="250" y="70" width="120" height="35" class="tabs" rx="3" />
  <text x="270" y="95" class="label" font-size="12">Butchered</text>

  <rect x="380" y="70" width="120" height="35" class="tabs" rx="3" />
  <text x="400" y="95" class="label" font-size="12">Refined</text>

  <rect x="510" y="70" width="120" height="35" class="tabs" rx="3" />
  <text x="530" y="95" class="label" font-size="12">Crafted</text>

  <rect x="640" y="70" width="120" height="35" class="tabs" rx="3" />
  <text x="660" y="95" class="label" font-size="12">Currency</text>

  <!-- LEFT PANEL: Filterable material list -->
  <rect x="10" y="120" width="350" height="950" class="panel" rx="3" />
  <text x="25" y="150" class="label" font-weight="700">Known Materials</text>

  <!-- Search -->
  <rect x="20" y="165" width="330" height="30" class="tabs" rx="3" />
  <text x="30" y="187" class="subtext">Search materials...</text>

  <!-- Material entries -->
  <rect x="20" y="205" width="330" height="30" class="row-alt" rx="2" />
  <text x="30" y="225" class="label">Chitin Extract</text>
  <text x="280" y="225" class="subtext" text-anchor="end">⬤ Rare</text>

  <rect x="20" y="240" width="330" height="30" rx="2" />
  <text x="30" y="260" class="label">Crystalline Bone</text>
  <text x="280" y="260" class="subtext" text-anchor="end">⬤ Common</text>

  <rect x="20" y="275" width="330" height="30" class="row-alt" rx="2" />
  <text x="30" y="295" class="label">Venom Gland Fluid</text>
  <text x="280" y="295" class="subtext" text-anchor="end">⬤ Uncommon</text>

  <rect x="20" y="310" width="330" height="30" rx="2" />
  <text x="30" y="330" class="label">Mycelial Network</text>
  <text x="280" y="330" class="subtext" text-anchor="end">⬤ Rare</text>

  <rect x="20" y="345" width="330" height="30" class="row-alt" rx="2" />
  <text x="30" y="365" class="label">Silicon Compound</text>
  <text x="280" y="365" class="subtext" text-anchor="end">⬪ Very Rare</text>

  <rect x="20" y="380" width="330" height="30" rx="2" />
  <text x="30" y="400" class="label">Amber Resin</text>
  <text x="280" y="400" class="subtext" text-anchor="end">⬤ Common</text>

  <!-- CENTER PANEL: Material detail -->
  <rect x="370" y="120" width="1200" height="950" class="panel" rx="3" />

  <!-- Header -->
  <rect x="370" y="120" width="1200" height="60" class="header" rx="3 3 0 0" />
  <text x="390" y="150" fill="white" class="label" font-size="18" font-weight="700">Chitin Extract</text>
  <text x="390" y="170" fill="#aaa" class="subtext">Canonical: chitin_extract | Label: "shell_armor" (Chronicler-assigned)</text>

  <!-- Section 1: 17-Property Profile -->
  <text x="390" y="210" class="label" font-weight="700">Material Properties (17 measured)</text>
  <line x1="390" y1="215" x2="1550" y2="215" class="divider" />

  <!-- Properties in a grid-like layout -->
  <text x="390" y="240" class="property-name">Density:</text>
  <rect x="520" y="233" width="180" height="10" class="chart-bar" rx="2" />
  <text x="720" y="240" class="subtext">7.2 g/cm³ (high)</text>

  <text x="390" y="265" class="property-name">Hardness:</text>
  <rect x="520" y="258" width="220" height="10" class="chart-bar" rx="2" />
  <text x="750" y="265" class="subtext">8.4/10 (very hard)</text>

  <text x="390" y="290" class="property-name">Tensile Strength:</text>
  <rect x="520" y="283" width="200" height="10" class="chart-bar" rx="2" />
  <text x="740" y="290" class="subtext">850 MPa (strong)</text>

  <text x="390" y="315" class="property-name">Elasticity:</text>
  <rect x="520" y="308" width="120" height="10" class="chart-bar" rx="2" />
  <text x="660" y="315" class="subtext">0.31 modulus</text>

  <text x="390" y="340" class="property-name">Thermal Conductivity:</text>
  <rect x="520" y="333" width="90" height="10" class="chart-bar" rx="2" />
  <text x="630" y="340" class="subtext">2.1 W/m·K (low)</text>

  <text x="390" y="365" class="property-name">Ignition Point:</text>
  <rect x="520" y="358" width="140" height="10" class="chart-bar" rx="2" />
  <text x="680" y="365" class="subtext">450°C (resistant)</text>

  <text x="390" y="390" class="property-name">Solubility:</text>
  <rect x="520" y="383" width="50" height="10" class="chart-bar" rx="2" />
  <text x="590" y="390" class="subtext">3% (insoluble)</text>

  <text x="900" y="240" class="property-name">Reactivity:</text>
  <rect x="1030" y="233" width="100" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="240" class="subtext">2.1/10 (inert)</text>

  <text x="900" y="265" class="property-name">Magnetism:</text>
  <rect x="1030" y="258" width="20" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="265" class="subtext">0.05 (none)</text>

  <text x="900" y="290" class="property-name">Porosity:</text>
  <rect x="1030" y="283" width="80" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="290" class="subtext">12% (porous)</text>

  <text x="900" y="315" class="property-name">Luminosity:</text>
  <rect x="1030" y="308" width="110" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="315" class="subtext">0.8 cd/m²</text>

  <text x="900" y="340" class="property-name">Volatility:</text>
  <rect x="1030" y="333" width="40" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="340" class="subtext">1.2% (stable)</text>

  <text x="900" y="365" class="property-name">Edibility:</text>
  <rect x="1030" y="358" width="30" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="365" class="subtext">0.1/10 (toxic)</text>

  <text x="900" y="390" class="property-name">Nutrition (if edible):</text>
  <rect x="1030" y="383" width="10" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="390" class="subtext">—</text>

  <text x="390" y="420" class="property-name">Toxicity:</text>
  <rect x="520" y="413" width="160" height="10" class="chart-bar" rx="2" />
  <text x="700" y="420" class="subtext">6.8/10 (toxic)</text>

  <text x="900" y="420" class="property-name">Rarity:</text>
  <rect x="1030" y="413" width="140" height="10" class="chart-bar" rx="2" />
  <text x="1150" y="420" class="subtext">7.5/10 (rare)</text>

  <text x="390" y="445" class="property-name">Value Index:</text>
  <rect x="520" y="438" width="240" height="10" class="chart-bar" rx="2" />
  <text x="770" y="445" class="subtext">285 currency units/kg</text>

  <!-- Section 2: Provenance -->
  <text x="390" y="485" class="label" font-weight="700">Provenance &#38; Sourcing</text>
  <line x1="390" y1="490" x2="1550" y2="490" class="divider" />

  <text x="390" y="515" class="subtext">Found in: [Armored-Predator α drops] (35% drop rate), [Crystalline Cavern biome] (surface deposits, low yield)</text>
  <text x="390" y="540" class="subtext">Production recipes: Tannin + Bone Marrow → Chitin Extract (craft_durable_shell primitive)</text>
  <text x="390" y="565" class="subtext">Butchering yields: Armored creatures yield 1.5–3.2 kg per specimen depending on size</text>

  <!-- Section 3: Uses -->
  <text x="390" y="605" class="label" font-weight="700">Recipes &#38; Combat Effects</text>
  <line x1="390" y1="610" x2="1550" y2="610" class="divider" />

  <text x="390" y="635" class="subtext">Consumed by: 7 crafting recipes (armor_shell, shield_carapace, tool_hardening...)</text>
  <text x="390" y="660" class="subtext">Combat effect: inject_substance using Chitin Extract applies "hardened carapace" buff (+3 armor, 60 ticks)</text>
  <text x="390" y="685" class="subtext">Faction use: Traders favor this for high-value barter (3× price modifier in market-dominant factions)</text>

  <!-- Section 4: Market data mini-chart -->
  <text x="390" y="725" class="label" font-weight="700">Market Trend (last 500 ticks)</text>
  <line x1="390" y1="730" x2="1550" y2="730" class="divider" />

  <!-- Simple line chart placeholder -->
  <polyline points="390,750 450,740 510,735 570,745 630,730 690,725 750,720" fill="none" stroke="#0099cc" stroke-width="2" />
  <text x="390" y="770" class="subtext">Price trend: ↓ down 8% | Volume: 1,240 units traded | Hot faction: Traders' Collective (140% markup)</text>

  <!-- RIGHT PANEL: Comparison -->
  <rect x="1580" y="120" width="330" height="950" class="panel" rx="3" />
  <text x="1595" y="150" class="label" font-weight="700">Comparison</text>
  <text x="1595" y="180" class="subtext">(select second material)</text>

  <rect x="1595" y="200" width="300" height="30" class="tabs" rx="2" />
  <text x="1610" y="220" class="subtext">+ Add material</text>

</svg>
