<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: monospace; font-size: 12px; }
      .toolbar { fill: #e0e0e0; stroke: #333; stroke-width: 1; }
      .panel { fill: #f5f5f5; stroke: #333; stroke-width: 1; }
      .chart-bg { fill: #fff; stroke: #666; stroke-width: 1; }
      .map-bg { fill: #ccddff; stroke: #333; stroke-width: 1; }
      .grid-line { stroke: #999; stroke-width: 0.5; stroke-dasharray: 2,2; }
      .axis-line { stroke: #333; stroke-width: 1; }
      .layer-chip { fill: #ddd; stroke: #666; stroke-width: 1; }
      .active-chip { fill: #99ff99; stroke: #00cc00; stroke-width: 2; }
      .label-text { font-size: 11px; fill: #333; }
      .title-text { font-size: 14px; font-weight: bold; fill: #000; }
      .legend-text { font-size: 10px; fill: #555; }
      .cold { fill: #3366ff; }
      .temperate { fill: #ffcc00; }
      .hot { fill: #ff3333; }
      .dial-circle { fill: none; stroke: #666; stroke-width: 2; }
      .dial-needle { stroke: #cc0000; stroke-width: 2; }
    </style>
    <title>Climate &amp; Biome Inspector</title>
    <desc>World-scale environment inspector with multi-layer rendering. Sources: Climate Simulator (Hadley/Ferrel, Milankovitch), Biome Registry (Whittaker), Geology (plate tectonics, elevation).</desc>
  </defs>

  <!-- Top toolbar: layer toggles -->
  <rect class="toolbar" x="0" y="0" width="1920" height="60"/>
  <text class="title-text" x="10" y="25">CLIMATE &amp; BIOME OVERLAY</text>

  <rect class="active-chip" x="10" y="30" width="100" height="25"/>
  <text class="label-text" x="20" y="48">Temperature</text>

  <rect class="layer-chip" x="120" y="30" width="100" height="25"/>
  <text class="label-text" x="130" y="48">Precipitation</text>

  <rect class="layer-chip" x="230" y="30" width="80" height="25"/>
  <text class="label-text" x="245" y="48">Biome</text>

  <rect class="layer-chip" x="320" y="30" width="60" height="25"/>
  <text class="label-text" x="330" y="48">Wind</text>

  <rect class="layer-chip" x="390" y="30" width="80" height="25"/>
  <text class="label-text" x="405" y="48">Elevation</text>

  <rect class="layer-chip" x="480" y="30" width="100" height="25"/>
  <text class="label-text" x="495" y="48">Tectonic Age</text>

  <rect class="layer-chip" x="590" y="30" width="100" height="25"/>
  <text class="label-text" x="605" y="48">Season</text>

  <text class="label-text" x="710" y="48">Opacity: [-----o---] 70%</text>
  <text class="label-text" x="900" y="48">[Grid]  [Future Projection]</text>

  <!-- Main map area (center) -->
  <rect class="map-bg" x="10" y="70" width="1220" height="750"/>
  <text class="title-text" x="20" y="95">WORLD MAP — Current Layer: Temperature (Season: Spring, Year 8,942)</text>

  <!-- Simplified world grid -->
  <line class="grid-line" x1="100" y1="70" x2="100" y2="820"/>
  <line class="grid-line" x1="200" y1="70" x2="200" y2="820"/>
  <line class="grid-line" x1="300" y1="70" x2="300" y2="820"/>
  <line class="grid-line" x1="400" y1="70" x2="400" y2="820"/>
  <line class="grid-line" x1="500" y1="70" x2="500" y2="820"/>
  <line class="grid-line" x1="600" y1="70" x2="600" y2="820"/>
  <line class="grid-line" x1="700" y1="70" x2="700" y2="820"/>
  <line class="grid-line" x1="800" y1="70" x2="800" y2="820"/>
  <line class="grid-line" x1="900" y1="70" x2="900" y2="820"/>
  <line class="grid-line" x1="1000" y1="70" x2="1000" y2="820"/>
  <line class="grid-line" x1="1100" y1="70" x2="1100" y2="820"/>

  <line class="grid-line" x1="10" y1="150" x2="1230" y2="150"/>
  <line class="grid-line" x1="10" y1="250" x2="1230" y2="250"/>
  <line class="grid-line" x1="10" y1="350" x2="1230" y2="350"/>
  <line class="grid-line" x1="10" y1="450" x2="1230" y2="450"/>
  <line class="grid-line" x1="10" y1="550" x2="1230" y2="550"/>
  <line class="grid-line" x1="10" y1="650" x2="1230" y2="650"/>
  <line class="grid-line" x1="10" y1="750" x2="1230" y2="750"/>

  <!-- Placeholder temperature gradient regions -->
  <rect class="cold" x="10" y="70" width="300" height="140" opacity="0.4"/>
  <text class="legend-text" x="100" y="140">Arctic</text>

  <rect class="temperate" x="10" y="210" width="200" height="130" opacity="0.3"/>
  <text class="legend-text" x="50" y="260">Temperate</text>

  <rect class="hot" x="310" y="280" width="300" height="150" opacity="0.4"/>
  <text class="legend-text" x="400" y="360">Sahara-like</text>

  <rect class="temperate" x="650" y="150" width="250" height="200" opacity="0.3"/>
  <text class="legend-text" x="720" y="260">Temperate</text>

  <rect class="cold" x="950" y="70" width="280" height="160" opacity="0.4"/>
  <text class="legend-text" x="1020" y="140">Frozen</text>

  <!-- Color scale legend -->
  <rect class="panel" x="10" y="830" width="1220" height="80"/>
  <text class="legend-text" x="20" y="850">TEMPERATURE SCALE (°C):</text>

  <rect class="cold" x="20" y="860" width="30" height="20"/>
  <text class="legend-text" x="60" y="875">-40 to -10</text>

  <rect class="cold" x="200" y="860" width="30" height="20" opacity="0.5"/>
  <text class="legend-text" x="240" y="875">-10 to 0</text>

  <rect class="temperate" x="380" y="860" width="30" height="20" opacity="0.5"/>
  <text class="legend-text" x="420" y="875">0 to 15</text>

  <rect class="temperate" x="560" y="860" width="30" height="20"/>
  <text class="legend-text" x="600" y="875">15 to 25</text>

  <rect class="hot" x="740" y="860" width="30" height="20" opacity="0.5"/>
  <text class="legend-text" x="780" y="875">25 to 35</text>

  <rect class="hot" x="920" y="860" width="30" height="20"/>
  <text class="legend-text" x="960" y="875">35+ (extreme)</text>

  <!-- Right panel: Milankovitch dials -->
  <rect class="panel" x="1240" y="70" width="680" height="400"/>
  <text class="title-text" x="1250" y="95">MILANKOVITCH PHASE (cycles drive climate)</text>

  <!-- Eccentricity dial -->
  <text class="label-text" x="1250" y="130">Eccentricity (100 ky cycle)</text>
  <circle class="dial-circle" cx="1380" cy="200" r="60"/>
  <circle cx="1380" cy="200" r="4" fill="#000"/>
  <line class="dial-needle" x1="1380" y1="200" x2="1420" y2="160"/>
  <text class="label-text" x="1320" y="280">Current: 0.031 (near min)</text>

  <!-- Obliquity dial -->
  <text class="label-text" x="1550" y="130">Obliquity (41 ky cycle)</text>
  <circle class="dial-circle" cx="1680" cy="200" r="60"/>
  <circle cx="1680" cy="200" r="4" fill="#000"/>
  <line class="dial-needle" x1="1680" y1="200" x2="1730" y2="150"/>
  <text class="label-text" x="1620" y="280">Current: 23.7° (mid-range)</text>

  <!-- Precession dial -->
  <text class="label-text" x="1250" y="330">Precession (19 ky cycle)</text>
  <circle class="dial-circle" cx="1380" cy="400" r="60"/>
  <circle cx="1380" cy="400" r="4" fill="#000"/>
  <line class="dial-needle" x1="1380" y1="400" x2="1330" y2="450"/>
  <text class="label-text" x="1320" y="480">Current: 281° (heading to min)</text>

  <!-- Long-term trend micro-chart -->
  <text class="label-text" x="1550" y="330">Eccentricity over 400 ky</text>
  <rect class="chart-bg" x="1520" y="340" width="190" height="140"/>
  <line class="axis-line" x1="1530" y1="470" x2="1700" y2="470"/>
  <polyline fill="none" stroke="#0066cc" stroke-width="1" points="1530,450 1550,440 1570,435 1590,440 1610,450 1630,460 1650,465 1670,450 1700,430"/>

  <!-- Right panel: Climate event log -->
  <rect class="panel" x="1240" y="480" width="680" height="430"/>
  <text class="title-text" x="1250" y="505">CLIMATE EVENT LOG</text>

  <rect x="1250" y="520" width="660" height="370" fill="#fff" stroke="#666" stroke-width="1"/>

  <text class="label-text" x="1260" y="545">1. GLACIAL MAXIMUM PEAK — t=12,400 | Eccentricity: 0.007</text>
  <text class="legend-text" x="1280" y="565">Affected biomes: Tundra (expanded +15%), Taiga (compressed -8%),</text>
  <text class="legend-text" x="1280" y="580">Sea level dropped 120m. Milankovitch phase: minimum eccentricity,</text>
  <text class="legend-text" x="1280" y="595">high obliquity. Duration: ~200 ticks. Recovery: 400 ticks (nonlinear).</text>

  <text class="label-text" x="1260" y="625">2. MONSOON SHIFT — t=8,200 | Hadley/Ferrel cell displacement</text>
  <text class="legend-text" x="1280" y="645">Precipitation moved 15° latitude poleward. Whittaker biome boundary</text>
  <text class="legend-text" x="1280" y="660">shifted: Savanna → Grassland transition zone. Agent-driven adaptation:</text>
  <text class="legend-text" x="1280" y="675">Grassland faction migration +40%, Savanna abandon -22%.</text>

  <text class="label-text" x="1260" y="705">3. PLATE COLLISION EVENT — t=15,100 | Tectonic age map updated</text>
  <text class="legend-text" x="1280" y="725">Mountain range elevation +280m over 50 ticks. Precipitation shadow</text>
  <text class="legend-text" x="1280" y="740">effect downstream: Desert precipitation -12%. Volcanic outgassing phase</text>
  <text class="legend-text" x="1280" y="755">raised CO₂ proxy; predicted warming +1.2°C over 300 ticks.</text>

  <text class="label-text" x="1260" y="785">4. SEASONAL FLIP — t=9,871 | Precession minimum</text>
  <text class="legend-text" x="1280" y="805">Northern hemisphere winter more extreme (longer, colder). Biome shift:</text>
  <text class="legend-text" x="1280" y="820">Boreal forest → Temperate grassland at fringe. Agent food availability</text>
  <text class="legend-text" x="1280" y="835">stress: herds migrated; faction settlement patterns destabilized.</text>

  <!-- Bottom: Time scrubber -->
  <rect class="panel" x="10" y="920" width="1910" height="140"/>
  <text class="title-text" x="20" y="945">CLIMATE TIME SCRUBBER</text>

  <text class="label-text" x="20" y="975">Centuries/Millennia Resolution:</text>
  <rect x="20" y="985" width="1800" height="25" fill="#fff" stroke="#666" stroke-width="1"/>
  <line class="axis-line" x1="40" y1="997" x2="1800" y2="997"/>
  <circle cx="950" cy="997" r="6" fill="#cc0000" stroke="#cc0000"/>
  <text class="legend-text" x="20" y="1020">t=0 ky</text>
  <text class="legend-text" x="930" y="1020">t=9.87 ky (current)</text>
  <text class="legend-text" x="1780" y="1020">t=20 ky</text>

  <text class="label-text" x="20" y="1050">Per-Season Resolution (zoom into single year):</text>
  <rect x="20" y="1060" width="500" height="25" fill="#fff" stroke="#666" stroke-width="1"/>
  <line class="axis-line" x1="40" y1="1072" x2="500" y2="1072"/>
  <circle cx="350" cy="1072" r="5" fill="#cc0000" stroke="#cc0000"/>
  <text class="legend-text" x="20" y="1095">Spring | Summer (here) | Fall | Winter</text>

</svg>
